<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my Styled Calculator</title>
    <link rel="stylesheet" href="styledcal.css">
</head>
<body>
     

    
<div class="calculator-card">
        <h2>Mini Calculator</h2>

        <div class="calculator">
     
      <input type="text" style="width: 200px; height: 40px;" id="display" disabled>
      </div>
      
    <div class="display-buttons">
        <button style="width: 45px; height:45px ;" onclick="addtoplay('1')">1</button>
        <button style="width: 45px; height:45px ;" onclick="addtoplay('2')">2</button>
        <button  style="width: 45px; height:45px"onclick="addtoplay('3')">3</button>
        <button style="width: 45px; height:45px" onclick="addtoplay('/')">/</button>
        <br>
        <button style="width: 45px; height:45px" onclick="addtoplay('4')">4</button>
        <button style="width: 45px; height:45px" onclick="addtoplay('5')">5</button>
        <button style="width: 45px; height:45px"  onclick="addtoplay('6')">6</button>
        <button style="width: 45px; height:45px" onclick="addtoplay('-')">-</button>
        <br>
        <!-- hello -->


        <button style="width: 45px; height:45px" onclick="addtoplay('7')">7</button>
        <button style="width: 45px; height:45px" onclick="addtoplay('8')">8</button>
        <button style="width: 45px; height:45px" onclick="addtoplay('9')">9</button>
        <button style="width: 45px; height:45px"  onclick="addtoplay('*')">*</button>
        <br>

        
        
        <button style="width: 45px; height:45px"onclick="addtoplay('0')">0</button>
        <button  style="width: 45px; height:45px"onclick="clearDisplay('C')">C</button>
        <button style="width: 45px; height:45px"onclick="addtoplay('+')">+</button>
        <br><br>

        <button class="equal" onclick="calculate()">=</button>
        <br><br>
    </div>

    
    <div class="modal" id="resultModal">
        <div class="modal-content">
            <p id="resultText"></p>
            
        </div>
        <div class="button-close">
            <button>Close</button>
        </div>
        </div>
    </div>
    

</div>

<script src="styledcal.js"></script>

</body>
